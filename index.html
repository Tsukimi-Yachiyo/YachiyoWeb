<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="./favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YachiyoChat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      min-height: 100vh;
    }
    #app {
      min-height: 100vh;
      background-color: #000;
    }
    .app-loading-placeholder {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .app-loading-placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .app-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #2196f3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    // GitHub Pages 路由重定向恢复
    (function() {
      const storedPath = sessionStorage.getItem('ghp_redirect_path');
      if (storedPath) {
        // 清除存储，避免重复应用
        sessionStorage.removeItem('ghp_redirect_path');

        // 基础路径，必须与 vite.config.js 中的 base 配置一致
        const basePath = '/';

        // 构建新的完整路径
        // 确保 storedPath 以斜杠开头，且 basePath 以斜杠结尾
        const normalizedBase = basePath.endsWith('/') ? basePath : basePath + '/';
        const normalizedPath = storedPath.startsWith('/') ? storedPath : '/' + storedPath;
        const newPathname = normalizedBase + normalizedPath.substring(1); // 合并，避免双斜杠

        // 使用 history.replaceState 更新 URL，不刷新页面
        const newUrl = newPathname + window.location.search + window.location.hash;
        history.replaceState(null, '', newUrl);

        console.log('GitHub Pages 路由重定向恢复:', storedPath, '->', newUrl);
      }
    })();
  </script>
</head>

<body>
  <div id="app">
    <div class="app-loading-placeholder" id="app-loading">
      <div class="app-loading-spinner"></div>
    </div>
  </div>
  <!-- Live2DCubismCore script -->
  <script src="./Core/live2dcubismcore.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
