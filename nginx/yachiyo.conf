server {
    # 监听端口
    listen 80;
    server_name www.tsukimi-yachiyo.top tsukimi-yachiyo.top yachiyo.owo.vin www.yachiyo.owo.vin yachiyo.redchenk.com;

    # 前端项目打包后的 dist 目录路径
    root  /root/yachiyo/YachiyoWeb/dist;
    index index.html;

    # 开启 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 1. 单页应用 (SPA) 核心配置
    # 解决 Vue Router History 模式下刷新页面 404 的问题
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 反向代理配置：对应 Vite 中的 /api
    location /api {
        proxy_pass http://47.98.229.211:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 允许跨域（如果前后端分离有需要）
        add_header Access-Control-Allow-Origin *;
    }

    # 3. 反向代理配置：对应 Vite 中的 /file
    location /file {
        proxy_pass http://47.98.229.211:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存设置 (可选优化)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}