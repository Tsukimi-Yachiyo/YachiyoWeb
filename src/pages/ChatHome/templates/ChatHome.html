<div class="chat-container" @touchstart="onTouchStart" @touchend="onTouchEnd">
  <!-- 标题栏 -->
  <AppHeader 
    currentPage="chat" 
    :username="username" 
    :userAvatar="userAvatar" 
    @logout="logout" 
  />


  <!-- 模型加载覆盖层 -->
  <transition name="fade">
    <div v-if="isModelLoading" class="model-loading-overlay">
      <div class="loading-content">
        <div class="loading-text">{{ loadStatus }}</div>
        <div class="progress-bar-container">
          <div class="progress-bar" :style="{ width: loadProgress + '%' }"></div>
        </div>
      </div>
    </div>
  </transition>

  <!-- 遮罩层 -->
  <div v-if="isSidebarOpen" class="sidebar-overlay" @click="closeSidebar"></div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 左侧会话栏 -->
    <aside ref="sidebarRef" :class="['sidebar', { 'sidebar-open': isSidebarOpen }]">
      <div class="sidebar-header">
        <h2>对话选择</h2>
        <button class="new-chat-btn" @click="createNewConversation" :disabled="isCreating || isModelLoading">
          <span class="plus-icon">+</span>
          <span class="btn-text">{{ isCreating ? '创建中...' : '新建' }}</span>
        </button>
      </div>
      <div class="conversation-list" ref="conversationListRef">
        <transition-group name="conversation">
          <div v-for="conv in conversations" :key="conv.id" :class="['conversation-item', { active: conv.id === currentConversationId }]"
            @click="selectConversation(conv)" :disabled="isModelLoading"
            @mouseenter="handleMouseEnter(conv.id)" @mouseleave="handleMouseLeave"
            @touchstart="onTouchStart($event, () => handleLongPress(conv.id))" @touchend="onTouchEnd">
            <span class="conversation-name" v-if="editModeConversationId !== conv.id">{{ conv.title || '对话 ' + conv.id }}</span>
            <div v-else class="edit-title-input-wrapper">
              <input v-model="editTitle" @keyup.enter="saveEditTitle(conv.id)" @blur="saveEditTitle(conv.id)" 
                @keyup.esc="cancelEditTitle" class="edit-title-input" autofocus />
              <div class="mobile-buttons">
                <button @click="saveEditTitle(conv.id)" class="edit-save-btn">保存</button>
                <button @click="cancelEditTitle" class="edit-cancel-btn">取消</button>
              </div>
            </div>
            <div v-if="(hoveredConversationId === conv.id || longPressedConversationId === conv.id) && editModeConversationId !== conv.id" class="conversation-actions">
              <button @click.stop="startEditTitle(conv)" class="action-btn edit-btn" title="编辑标题">
                <img v-if="editIconUrl" :src="editIconUrl" alt="编辑" style="width: 16px; height: 16px;" />
                <span v-else>✏️</span>
              </button>
              <button @click="handleDeleteConversation(conv.id, $event)" class="action-btn delete-btn" title="删除会话">
                <img v-if="deleteIconUrl" :src="deleteIconUrl" alt="删除" style="width: 16px; height: 16px;" />
                <span v-else>🗑️</span>
              </button>
            </div>
          </div>
        </transition-group>
        <div v-if="conversations.length === 0" class="empty-conversations">
          暂无会话，点击上方新建按钮开始对话
        </div>
      </div>
    </aside>

    <!-- 右滑按钮 -->
    <button class="sidebar-toggle-btn" @click="toggleSidebar" :class="{ 'btn-hidden': isSidebarOpen }" :disabled="isModelLoading">
      <span class="toggle-icon">☰</span>
    </button>

    <!-- 右侧聊天区 -->
    <main class="chat-main" @click="isSidebarOpen && closeSidebar()">
    <!-- Live2D 模型展示 -->
    <div class="live2d-display">
      <Live2DModel />
    </div>

    <!-- 欢迎界面 -->
    <div v-if="!currentConversationId && !isModelLoading" class="welcome-screen">
      <div class="welcome-content">
          <!-- 对下面标签文字加粗 -->
        <h1>太阳西沉 夜幕降临</h1>
        <p>欢迎来到月读，{{ username }}！</p>
        <button class="start-chat-btn" @click="createNewConversation" :disabled="isModelLoading">
          开始新对话
        </button>
      </div>
    </div>

    <!-- 消息列表 -->
    <div v-else-if="!isModelLoading" class="message-list" ref="messageListRef">
      <transition-group name="message">
        <div v-for="(msg, index) in messages" :key="index" :class="['message', msg.type]">
          <div class="message-bubble">
            <span v-if="msg.type === 'assistant' && msg.isStreaming && !msg.content">思考中...</span>
            <span v-else>{{ msg.content }}</span>
            <div v-if="msg.type === 'assistant' && !msg.isStreaming" class="message-actions">
              <button
                class="voice-btn"
                :class="{ 'voice-loading': getVoiceStatus(msg.content).isLoading, 'voice-disabled': !isVoiceClickable(msg.content) }"
                :disabled="!isVoiceClickable(msg.content)"
                @click="playVoice(msg.content)"
                title="播放语音"
              >
                <span v-if="getVoiceStatus(msg.content).isLoading" class="voice-spinner"></span>
                <img v-else-if="voiceIconUrl" :src="voiceIconUrl" alt="播放语音" style="width: 16px; height: 16px;" />
                <span v-else>🔊</span>
              </button>
            </div>
          </div>
        </div>
      </transition-group>

      <!-- AI 输入中动画 -->
      <div v-if="isTyping" class="typing-indicator">
        <div class="typing-bubbles">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <!-- 输入区 -->
    <div v-if="currentConversationId && !isModelLoading" class="input-area">
      <div class="input-wrapper">
        <input v-model="inputMessage" @keyup.enter="sendMessage" placeholder="输入消息，按 Enter 发送..."
          :disabled="isChatLoading || isModelLoading" ref="inputRef" />
        <button class="send-btn" @click="sendMessage" :disabled="isChatLoading || isModelLoading || !inputMessage.trim()">
          <span v-if="isChatLoading" class="loading-spinner"></span>
          <!-- <span v-else>发送</span> -->
          <img v-else src="/icons/theme/ENTER.svg" alt="发送" width="36" height="36">
        </button>
      </div>
    </div>
  </main>
  </div>
</div>
