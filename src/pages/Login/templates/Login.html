<div class="login-container">
  <!-- 初始动画 -->
  <video 
    ref="introVideo" 
    class="intro-video" 
    muted 
    @ended="onIntroEnd"
  >
    您的浏览器不支持视频播放。
  </video>
  
  <!-- 循环背景动画 -->
  <video 
    ref="cycleVideo" 
    class="cycle-video" 
    muted 
    loop 
    style="display: none;"
  >
    您的浏览器不支持视频播放。
  </video>
  
  <!-- 加载中显示 -->
  <div v-if="!isVideoLoaded" class="loading-overlay">
    <div class="loading-text">正在登录月读</div>
  </div>
  
  <!-- 登录/注册表单 -->
  <div class="login-form" :class="{ 'fade-in': showForm }">
    <div class="form-header">
      <h2>{{ isRegisterMode ? '注册' : '登录' }}</h2>
    </div>
    
    <form @submit.prevent="handleFormSubmit">
      <div class="form-group">
        <label for="username">用户名</label>
        <input 
          type="text" 
          id="username" 
          v-model="form.username" 
          placeholder="请输入用户名"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input 
            type="password" 
            id="password" 
            v-model="form.password" 
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          >
      </div>
      
      <!-- 注册模式下显示邮箱、验证码和图形验证码 -->
      <div v-if="isRegisterMode">
        <div class="form-group">
          <label for="email">邮箱</label>
          <input 
            type="email" 
            id="email" 
            v-model="email" 
            placeholder="请输入邮箱"
            required
          >
        </div>
        

        
        <div class="form-group">
          <label for="code">验证码</label>
          <div class="code-container">
            <input 
              type="text" 
              id="code" 
              v-model="code" 
              placeholder="请输入邮箱验证码"
              required
            >
            <button 
              type="button" 
              class="code-btn" 
              :disabled="isSendingCode || codeCountdown > 0"
              @click="handleSendVerificationCode"
            >
              <span v-if="isSendingCode">发送中...</span>
              <span v-else-if="codeCountdown > 0">{{ Math.floor(codeCountdown / 60) }}分{{ codeCountdown % 60 }}秒后重发</span>
              <span v-else>获取验证码</span>
            </button>
          </div>
        </div>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="login-btn" :disabled="isLoading">
          {{ isLoading ? (isRegisterMode ? '注册中...' : '登录中...') : (isRegisterMode ? '注册' : '登录') }}
        </button>
      </div>
      
      <div v-if="error" class="error-message">
        {{ error }}
      </div>
      
      <div class="form-footer">
        <p>{{ isRegisterMode ? '已有账号？' : '还没有账号？' }} <a href="#" @click.prevent="toggleMode">{{ isRegisterMode ? '登录' : '注册' }}</a></p>
      </div>
    </form>
  </div>
  
  <!-- 登录成功背景过渡 -->
  <div class="success-overlay" :class="{ 'show': loginSuccess }"></div>
  
  <!-- 图形验证码弹窗 -->
  <div v-if="showCaptchaModal" class="captcha-modal">
    <div class="captcha-modal-content">
      <h3>验证身份</h3>
      <p>请输入图形验证码以获取邮箱验证码</p>
      <div class="captcha-modal-form">
        <div class="captcha-container">
          <input 
            type="text" 
            v-model="captchaInput" 
            placeholder="请输入图形验证码"
            required
          >
          <img :src="captchaUrl" alt="验证码" class="captcha-image" @click="refreshCaptcha" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==">
        </div>
        <div v-if="error" class="error-message">
          {{ error }}
        </div>
        <div class="captcha-modal-actions">
          <button type="button" class="cancel-btn" @click="handleCloseCaptchaModal">取消</button>
          <button type="button" class="confirm-btn" @click="handleConfirmCaptcha" :disabled="isSendingCode">
            {{ isSendingCode ? '发送中...' : '确认' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
