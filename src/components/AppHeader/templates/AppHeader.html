<header class="title-bar">
  <div class="title-bar-content">
    <div class="title-section">
      <button 
        class="app-title-button"
        @click="goToChat"
      >
        月见八千代
      </button>
      <div class="nav-buttons">
        <button 
          class="nav-button text-only"
          :class="{ active: currentPage === 'tsukuyomi' }"
          @click="goToTsukuyomi"
        >
          月读
        </button>
      </div>
    </div>
    <div class="user-info-header">
      <span class="username-header" :class="{ 'avatar-active': userProfileIsVisible }">{{ username }}</span>
      <UserProfilePopover 
        :username="username" 
        :userAvatar="userAvatar" 
        @logout="handleLogout" 
        @update:isVisible="value => userProfileIsVisible = value"
      >
        <template #trigger="{ showPopover, hidePopover, isVisible }">
          <div
            class="user-avatar-header"
            :class="{ 'avatar-active': isVisible }"
            @mouseenter="showPopover"
            @mouseleave="hidePopover"
          >
            <img v-if="userAvatar" :src="userAvatar" alt="用户头像" />
            <span v-else>{{ username && username.length > 0 ? username.charAt(0).toUpperCase() : 'U' }}</span>
          </div>
        </template>
      </UserProfilePopover>
    </div>
  </div>
</header>
